version: '3.9'

services:

  # ─── Redis ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: propalgo_redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - propalgo_net
    restart: unless-stopped

  # ─── Backend (FastAPI) ───────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: dashboard/backend/Dockerfile
      additional_contexts:
        context: ..
    container_name: propalgo_backend
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:///./data/prop_algo.db
      - PYTHONPATH=/app:/prop_algo_src
    volumes:
      - backend_data:/app/data
      - ../prop_algo/prop_algo:/prop_algo_src/prop_algo:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - propalgo_net
    restart: unless-stopped

  # ─── Frontend (Next.js) ──────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: propalgo_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://nginx:80
      - NEXT_PUBLIC_WS_URL=ws://nginx:80
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - propalgo_net
    restart: unless-stopped

  # ─── Nginx (Reverse Proxy) ───────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: propalgo_nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - propalgo_net
    restart: unless-stopped

networks:
  propalgo_net:
    driver: bridge

volumes:
  redis_data:
  backend_data:
